<!DOCTYPE html>
<html lang="sq">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>InTouch — Hyrje</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{min-height:100vh;display:flex;align-items:center;justify-content:center;
       background:#0a0a0f;font-family:system-ui,-apple-system,sans-serif;color:#e2e8f0}
  .card{background:#111118;border:1px solid #1e1e2e;border-radius:16px;padding:40px 36px;
        width:100%;max-width:400px;box-shadow:0 24px 48px rgba(0,0,0,.5)}
  .logo{text-align:center;margin-bottom:32px}
  .logo h1{font-size:1.8rem;font-weight:700;color:#6366f1;letter-spacing:-0.5px}
  .logo p{font-size:.85rem;color:#64748b;margin-top:4px}
  label{display:block;font-size:.8rem;font-weight:600;color:#94a3b8;
        text-transform:uppercase;letter-spacing:.05em;margin-bottom:6px}
  input{width:100%;padding:12px 14px;background:#0a0a0f;border:1px solid #1e1e2e;
        border-radius:8px;color:#e2e8f0;font-size:.95rem;outline:none;
        transition:border-color .2s}
  input:focus{border-color:#6366f1}
  .field{margin-bottom:20px}
  button{width:100%;padding:13px;background:#6366f1;border:none;border-radius:8px;
         color:#fff;font-size:1rem;font-weight:600;cursor:pointer;
         transition:background .2s;margin-top:4px}
  button:hover{background:#4f46e5}
  button:disabled{background:#374151;cursor:not-allowed}
  .error{background:#1a0a0a;border:1px solid #7f1d1d;color:#f87171;
         padding:10px 14px;border-radius:8px;font-size:.85rem;margin-bottom:16px;display:none}
  .spinner{display:inline-block;width:16px;height:16px;border:2px solid rgba(255,255,255,.3);
           border-top-color:#fff;border-radius:50%;animation:spin .6s linear infinite;
           vertical-align:middle;margin-right:6px}
  @keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>
<div class="card">
  <div class="logo">
    <h1>InTouch</h1>
    <p>Dashboard i Gjallë</p>
  </div>
  <div class="error" id="err"></div>
  <div class="field">
    <label>Përdoruesi</label>
    <input id="username" type="text" placeholder="username" autocomplete="username"/>
  </div>
  <div class="field">
    <label>Fjalëkalimi</label>
    <input id="password" type="password" placeholder="••••••••" autocomplete="current-password"/>
  </div>
  <button id="btn" onclick="login()">Hyr</button>
</div>

<script>
  // If already logged in, go straight to dashboard
  if (sessionStorage.getItem('token')) location.href = '/dashboard.html';

  document.addEventListener('keydown', e => { if (e.key === 'Enter') login(); });

  async function login() {
    const username = document.getElementById('username').value.trim();
    const password = document.getElementById('password').value;
    const btn = document.getElementById('btn');
    const err = document.getElementById('err');

    err.style.display = 'none';
    if (!username || !password) {
      showError('Plotëso të gjitha fushat.');
      return;
    }

    btn.disabled = true;
    btn.innerHTML = '<span class="spinner"></span>Duke u kyçur...';

    try {
      const res = await fetch('/api/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ username, password })
      });
      const data = await res.json();
      if (!res.ok) { showError(data.error || 'Gabim gjatë hyrjes.'); return; }
      sessionStorage.setItem('token', data.token);
      sessionStorage.setItem('restaurantName', data.restaurantName || '');
      location.href = '/dashboard.html';
    } catch {
      showError('Nuk mund të lidhet me serverin.');
    } finally {
      btn.disabled = false;
      btn.textContent = 'Hyr';
    }
  }

  function showError(msg) {
    const err = document.getElementById('err');
    err.textContent = msg;
    err.style.display = 'block';
  }
</script>
</body>
</html>
