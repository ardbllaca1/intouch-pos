<!doctype html>
<html lang="sq"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Admin POS</title>
<style>
:root{--bg:#0a0a0f;--surface:#111118;--accent:#6366f1}*{box-sizing:border-box;font-family:system-ui,-apple-system,sans-serif}
body{margin:0;background:var(--bg);color:#fff;padding:12px}.tabs{display:flex;gap:8px;flex-wrap:wrap}.tabs button{min-height:44px;border:none;border-radius:8px;background:#23233a;color:#fff;padding:0 12px}
.panel{display:none;background:var(--surface);padding:10px;border-radius:12px;margin-top:10px}.panel.active{display:block}
table{width:100%;border-collapse:collapse}th,td{padding:8px;border-bottom:1px solid #2a2a35}input,select,button{min-height:40px;border-radius:8px;border:1px solid #2a2a35;background:#1a1a25;color:#fff;padding:8px}button.action{background:var(--accent);border:none}
</style>  <link rel="manifest" href="/manifest.webmanifest">
  <meta name="theme-color" content="#111118">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <link rel="icon" href="/icons/icon.svg" type="image/svg+xml"></head><body>
<h1>Paneli Admin</h1>
<div class="tabs"><button data-p="products">Produktet</button><button data-p="categories">Kategoritë</button><button data-p="tables">Tavolinat</button><button data-p="waiters">Kamarierët</button><button data-p="reports">Raportet</button></div>
<section id="products" class="panel active"><h3>Produktet</h3><table><thead><tr><th>Emri</th><th>Cmimi</th><th>Kategoria</th><th>Aktiv</th><th></th></tr></thead><tbody id="productRows"></tbody></table></section>
<section id="categories" class="panel"><h3>Kategoritë</h3><div><input id="catName" placeholder="Emri"><input id="catIcon" placeholder="Ikona" value="🍽️"><input id="catColor" type="color" value="#6366f1"><button class="action" id="addCat">Shto</button></div><ul id="catList"></ul></section>
<section id="tables" class="panel"><h3>Tavolinat</h3><input id="tableName" placeholder="Tavolina e re"><select id="tableShape"><option value="square">square</option><option value="round">round</option></select><button class="action" id="addTable">Shto tavolinë</button><ul id="tableList"></ul></section>
<section id="waiters" class="panel"><h3>Kamarierët</h3><input id="waiterName" placeholder="Emri"><input id="waiterPin" placeholder="PIN" maxlength="4"><select id="waiterRole"><option>waiter</option><option>admin</option></select><button class="action" id="addWaiter">Shto</button><ul id="waiterList"></ul></section>
<section id="reports" class="panel"><h3>Raportet</h3><pre id="reportBox"></pre></section>
<script>
const subdomain = new URLSearchParams(location.search).get('client') || sessionStorage.getItem('subdomain') || 'demo';
const token = sessionStorage.getItem('token'); if(!token) location.href='/index.html';
if (sessionStorage.getItem('language') === 'sr') location.replace('/admin-sr.html' + location.search);
const headers = {'Content-Type':'application/json',Authorization:`Bearer ${token}`,'x-subdomain':subdomain};
const q=s=>document.querySelector(s), qa=s=>[...document.querySelectorAll(s)];
qa('.tabs button').forEach(b=>b.onclick=()=>{ qa('.panel').forEach(p=>p.classList.remove('active')); q('#'+b.dataset.p).classList.add('active'); });
async function api(path,opts={}){ const r=await fetch(path + (path.includes('?')?'&':'?') + 'client='+encodeURIComponent(subdomain),{...opts,headers:{...headers,...(opts.headers||{})}}); const j=await r.json(); if(!r.ok) throw new Error(j.error||'Gabim'); return j; }
let categories=[], products=[];
async function loadProducts(){ categories=await api('/api/menu/categories'); products=await api('/api/menu/products?all=1'); const body=q('#productRows'); body.innerHTML=''; products.forEach(p=>{ const tr=document.createElement('tr'); tr.innerHTML=`<td><input value="${p.name}"></td><td><input type="number" step="0.01" value="${p.price}"></td><td><select>${categories.map(c=>`<option value="${c.id}" ${c.id===p.category_id?'selected':''}>${c.name}</option>`).join('')}</select></td><td><input type="checkbox" ${p.active?'checked':''}></td><td><button class="action">Ruaj</button></td>`; tr.querySelector('button').onclick=()=>api('/api/menu/products/'+p.id,{method:'PUT',body:JSON.stringify({name:tr.children[0].querySelector('input').value,price:parseFloat(tr.children[1].querySelector('input').value),category_id:parseInt(tr.children[2].querySelector('select').value),active:tr.children[3].querySelector('input').checked?1:0})}).then(loadProducts); body.appendChild(tr); }); }
async function loadCategories(){ categories=await api('/api/menu/categories'); q('#catList').innerHTML=categories.map(c=>`<li>${c.icon} ${c.name} <input type="color" value="${c.color}" data-id="${c.id}"></li>`).join(''); q('#catList').querySelectorAll('input').forEach(i=>i.onchange=()=>api('/api/menu/categories/'+i.dataset.id,{method:'PUT',body:JSON.stringify({color:i.value})})); }
q('#addCat').onclick=()=>api('/api/menu/categories',{method:'POST',body:JSON.stringify({name:q('#catName').value,icon:q('#catIcon').value,color:q('#catColor').value})}).then(()=>{q('#catName').value='';loadCategories();loadProducts();});
async function loadTables(){ const rows=await api('/api/tables'); q('#tableList').innerHTML=rows.map(t=>`<li>${t.name} (${t.shape}) <button data-id="${t.id}">Fshi</button></li>`).join(''); q('#tableList').querySelectorAll('button').forEach(b=>b.onclick=()=>api('/api/tables/'+b.dataset.id,{method:'DELETE'}).then(loadTables)); }
q('#addTable').onclick=()=>api('/api/tables',{method:'POST',body:JSON.stringify({name:q('#tableName').value,shape:q('#tableShape').value})}).then(()=>{q('#tableName').value='';loadTables();});
async function loadWaiters(){ const rows=await api('/api/waiters'); q('#waiterList').innerHTML=rows.map(w=>`<li>${w.name} (${w.role})</li>`).join(''); }
q('#addWaiter').onclick=()=>api('/api/waiters',{method:'POST',body:JSON.stringify({name:q('#waiterName').value,pin:q('#waiterPin').value,role:q('#waiterRole').value})}).then(()=>{q('#waiterName').value='';q('#waiterPin').value='';loadWaiters();});
async function loadReports(){ const data=await api('/api/sales/today'); q('#reportBox').textContent=JSON.stringify({total:data.totalSales,byWaiter:data.byWaiter,byCategory:data.byDepartment},null,2); }
Promise.all([loadCategories(),loadProducts(),loadTables(),loadWaiters(),loadReports()]);
</script>  <script src="/pwa.js" defer></script>
</body></html>
