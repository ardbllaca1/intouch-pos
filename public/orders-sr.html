<!DOCTYPE html>
<html lang="sr-Latn">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <title>Lista porudžbina</title>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color: transparent; }
    :root {
      --bg:#0a0a0f; --surface:#111118; --surface2:#1a1a24; --border:#2a2a3a;
      --accent:#6366f1; --accent2:#8b5cf6; --green:#10b981; --red:#ef4444;
      --yellow:#f59e0b; --text:#f1f5f9; --muted:#64748b; --radius:14px;
    }
    body { background: var(--bg); color: var(--text); font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Inter', sans-serif; min-height:100vh; }
    .topbar {
      display:flex; align-items:center; justify-content:space-between;
      padding:0 max(16px, env(safe-area-inset-left)); padding-right:max(16px, env(safe-area-inset-right));
      height:56px; background:var(--surface); border-bottom:1px solid var(--border); position:sticky; top:0; z-index:100; backdrop-filter: blur(12px);
    }
    .topbar-left { display:flex; align-items:center; gap:10px; min-width:0; }
    .logo {
      width:30px; height:30px; border-radius:8px; flex-shrink:0;
      display:flex; align-items:center; justify-content:center; font-weight:800; font-size:12px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
    }
    .topbar-titles h1 { font-size:15px; font-weight:600; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
    .topbar-date { font-size:11px; color:var(--muted); }
    .btn {
      background: var(--surface2); border: 1px solid var(--border); color: var(--text);
      padding: 8px 12px; border-radius: 8px; cursor: pointer; font-size: 13px; min-height: 36px;
    }
    .btn:hover { background: var(--border); }
    .page { max-width: 1300px; margin: 0 auto; padding: 16px; }
    .card { background: var(--surface); border:1px solid var(--border); border-radius: var(--radius); padding: 14px; }
    .title { font-size: 22px; font-weight: 700; margin-bottom: 12px; }
    .table-wrap {
      border: 1px solid var(--border);
      border-radius: 10px;
      overflow: auto;
      max-height: calc(100vh - 180px);
      -webkit-overflow-scrolling: touch;
    }
    table { width: 100%; border-collapse: collapse; min-width: 700px; font-size: 13px; }
    thead th {
      position: sticky; top: 0; z-index: 2;
      background: var(--surface);
      color: var(--muted);
      text-align: left;
      font-size: 11px; text-transform: uppercase; letter-spacing: 0.05em;
      padding: 10px 12px;
      border-bottom: 1px solid var(--border);
    }
    tbody tr { border-bottom: 1px solid rgba(42,42,58,0.5); transition: background 0.15s; }
    tbody tr:hover { background: var(--surface2); }
    tbody td { padding: 10px 12px; }
    .val { color: var(--green); font-weight: 700; }
    .empty { text-align:center; color:var(--muted); padding:24px; }
    @media (min-width: 600px) {
      .topbar { height: 60px; padding: 0 24px; }
      .page { padding: 24px; }
    }
    @media (min-width: 900px) {
      .topbar { height: 64px; padding: 0 32px; }
      .topbar-titles h1 { font-size: 16px; }
      .page { padding: 32px; }
    }
  </style>
  <link rel="manifest" href="/manifest.webmanifest">
  <meta name="theme-color" content="#111118">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <link rel="icon" href="/icons/icon.svg" type="image/svg+xml"></head>
<body>
  <div class="topbar">
    <div class="topbar-left">
      <div class="logo">IT</div>
      <div class="topbar-titles">
        <h1 id="restaurantName">InTouch</h1>
        <div class="topbar-date">Lista porudžbina</div>
      </div>
    </div>
    <button id="btn-back" class="btn">← Nazad</button>
  </div>

  <main class="page">
    <section class="card">
      <h2 class="title">Lista porudžbina</h2>
      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>proizvod</th>
              <th>količina</th>
              <th>vrednost</th>
              <th>sto</th>
              <th>vreme</th>
              <th>konobar</th>
            </tr>
          </thead>
          <tbody id="ordersBody">
            <tr><td class="empty" colspan="6">Učitavanje...</td></tr>
          </tbody>
        </table>
      </div>
    </section>
  </main>

  <script>
    const token = sessionStorage.getItem('token');
    if (!token) { window.location.href = '/index.html'; throw new Error('No token'); }
    if ((sessionStorage.getItem('language') || 'sq') !== 'sr') {
      window.location.replace('/orders.html' + window.location.search);
      throw new Error('switching page language');
    }

    function hostClient() {
      const rootDomain = 'intouch-data.com';
      const hostname = window.location.hostname.toLowerCase();
      if (hostname.endsWith('.' + rootDomain) && hostname !== 'www.' + rootDomain) {
        return hostname.slice(0, -rootDomain.length - 1).split('.')[0];
      }
      return '';
    }

    const clientParam = hostClient() || new URLSearchParams(window.location.search).get('client') || sessionStorage.getItem('client') || '';
    const restaurantName = sessionStorage.getItem('restaurantName') || 'InTouch';
    document.getElementById('restaurantName').textContent = restaurantName;
    document.title = restaurantName + ' – Lista porudžbina';

    function fmt(n) {
      return parseFloat(n || 0).toLocaleString('sr-Latn-RS', { minimumFractionDigits: 2, maximumFractionDigits: 2 }) + '€';
    }

    function backToDashboard() {
      window.location.href = '/dashboard-sr.html' + (clientParam ? '?client=' + encodeURIComponent(clientParam) : '');
    }

    function renderOrders(orders) {
      const tbody = document.getElementById('ordersBody');
      if (!orders.length) {
        tbody.innerHTML = '<tr><td class="empty" colspan="6">Još nema porudžbina.</td></tr>';
        return;
      }
      tbody.innerHTML = orders.map(o => `
        <tr>
          <td>${o.produkti || ''}</td>
          <td>${o.sasia ?? ''}</td>
          <td class="val">${fmt(o.vlera)}</td>
          <td>${o.tav || ''}</td>
          <td>${o.time || ''}</td>
          <td>${o.kam || ''}</td>
        </tr>
      `).join('');
    }

    async function fetchData() {
      try {
        const res = await fetch('/api/sales/today?client=' + encodeURIComponent(clientParam), {
          headers: { Authorization: 'Bearer ' + token }
        });
        if (res.status === 401) { sessionStorage.clear(); window.location.href = '/index.html'; return; }
        const data = await res.json();
        const orders = Array.isArray(data.allOrders) ? data.allOrders : (Array.isArray(data.recentOrders) ? data.recentOrders : []);
        renderOrders(orders);
      } catch (err) {
        console.error(err);
      }
    }

    document.getElementById('btn-back').addEventListener('click', backToDashboard);
    fetchData();
    setInterval(fetchData, 30000);
  </script>
  <script src="/pwa.js" defer></script>
</body>
</html>
