<!DOCTYPE html>
<html lang="sr-Latn">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="theme-color" content="#111118" />
  <title>InTouch - Nema veze</title>
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{min-height:100vh;display:flex;align-items:center;justify-content:center;background:#0a0a0f;color:#f1f5f9;font-family:system-ui,-apple-system,sans-serif;padding:24px}
    main{width:100%;max-width:420px;background:#111118;border:1px solid #2a2a3a;border-radius:14px;padding:28px;text-align:center}
    .logo{width:52px;height:52px;border-radius:14px;margin:0 auto 18px;background:linear-gradient(135deg,#6366f1,#8b5cf6);display:flex;align-items:center;justify-content:center;font-weight:800}
    h1{font-size:22px;margin-bottom:8px}
    p{color:#94a3b8;line-height:1.5}
    button{margin-top:20px;border:1px solid #2a2a3a;background:#1a1a24;color:#f1f5f9;border-radius:8px;padding:11px 14px;font-weight:700}
  </style>
  <link rel="manifest" href="/manifest.webmanifest">
  <meta name="theme-color" content="#111118">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <link rel="icon" href="/icons/icon.svg" type="image/svg+xml"></head>
<body>
  <main>
    <div class="logo">IT</div>
    <h1>Nema internet veze</h1>
    <p>Aplikacija je van mreže. Proverite internet vezu i pokušajte ponovo.</p>
    <button type="button" onclick="location.reload()">Pokušaj ponovo</button>
  </main>
  <script src="/pwa.js" defer></script>
</body>
</html>
