<!DOCTYPE html>
<html lang="sq">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>bartek POS - Login</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --page: #eef3fb;
      --panel: #ffffff;
      --text: #5c5c5f;
      --muted: #babcc2;
      --field: #f7f8fa;
      --field-border: #80a8ff;
      --primary: #5a8df7;
      --primary-pressed: #4c7fe6;
      --client-green: #637f12;
      --shadow: 0 28px 80px rgba(36, 48, 72, 0.06);
    }

    body {
      min-height: 100vh;
      background: var(--page);
      color: var(--text);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      overflow: hidden;
    }

    .login-shell {
      min-height: 100vh;
      display: grid;
      grid-template-columns: minmax(420px, 1fr) minmax(420px, 540px);
      gap: 28px;
      padding: 22px;
    }

    .client-stage {
      display: grid;
      place-items: center;
      min-width: 0;
    }

    .client-badge {
      width: min(465px, 56vw);
      aspect-ratio: 1;
      border-radius: 50%;
      background: var(--client-green);
      display: grid;
      place-items: center;
      color: #fff;
      box-shadow: 0 30px 70px rgba(38, 52, 20, 0.08);
    }

    .client-badge-content {
      display: grid;
      justify-items: center;
      gap: 18px;
      transform: translateY(6px);
    }

    .client-mark {
      width: 158px;
      height: 98px;
      position: relative;
    }

    .client-mark::before,
    .client-mark::after {
      content: "";
      position: absolute;
      bottom: 0;
      width: 72px;
      height: 98px;
      background: #fff;
      clip-path: polygon(0 0, 100% 100%, 0 100%);
    }

    .client-mark::before {
      left: 0;
    }

    .client-mark::after {
      right: 0;
      transform: scaleX(-1);
    }

    .client-name-logo {
      max-width: 360px;
      text-align: center;
      color: #fff;
      font-family: Georgia, "Times New Roman", serif;
      font-size: 38px;
      line-height: 1;
      letter-spacing: 0.02em;
    }

    .login-panel {
      min-height: calc(100vh - 44px);
      background: var(--panel);
      border-radius: 18px;
      box-shadow: var(--shadow);
      display: grid;
      grid-template-rows: 1fr auto 1fr auto;
      justify-items: center;
      padding: 68px 54px 40px;
    }

    .product-logo {
      align-self: start;
      display: flex;
      align-items: center;
      gap: 12px;
      color: var(--primary);
      font-size: 25px;
      font-weight: 800;
      letter-spacing: -0.02em;
    }

    .product-symbol {
      width: 52px;
      height: 70px;
      position: relative;
      display: inline-block;
    }

    .product-symbol::before {
      content: "";
      position: absolute;
      left: 8px;
      top: 0;
      width: 19px;
      height: 66px;
      border-radius: 13px;
      background: var(--primary);
    }

    .product-symbol::after {
      content: "";
      position: absolute;
      left: 8px;
      bottom: 0;
      width: 47px;
      height: 47px;
      border-radius: 50%;
      background: var(--primary);
    }

    .product-hole {
      position: absolute;
      z-index: 2;
      left: 25px;
      bottom: 15px;
      width: 16px;
      height: 16px;
      border-radius: 50%;
      background: #fff;
    }

    .login-form {
      width: 100%;
      max-width: 330px;
      align-self: center;
      transform: translateY(12px);
    }

    .venue-title {
      text-align: center;
      font-size: 31px;
      line-height: 1.1;
      color: #5d5d60;
      font-weight: 800;
      margin-bottom: 12px;
    }

    .helper-text {
      text-align: center;
      color: var(--muted);
      font-size: 15px;
      margin-bottom: 22px;
    }

    .mode-tabs {
      display: grid;
      grid-template-columns: 1fr 1fr;
      min-height: 48px;
      padding: 3px;
      background: #f6f6f7;
      border-radius: 10px;
      margin-bottom: 30px;
    }

    .mode-tabs button {
      border: 0;
      border-radius: 9px;
      background: transparent;
      color: #b9bbc0;
      font: inherit;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
    }

    .mode-tabs button.active {
      background: #fff;
      color: #77797d;
      box-shadow: 0 2px 12px rgba(36, 42, 58, 0.06);
    }

    .field {
      position: relative;
      margin-bottom: 32px;
    }

    .field-icon {
      position: absolute;
      left: 16px;
      top: 50%;
      width: 22px;
      height: 22px;
      transform: translateY(-50%);
      color: #7ea7ff;
      pointer-events: none;
    }

    .pin-input {
      width: 100%;
      height: 54px;
      border: 2px solid var(--field-border);
      border-radius: 10px;
      background: #fff;
      outline: 0;
      color: #55585d;
      padding: 0 16px 0 54px;
      font-size: 17px;
      letter-spacing: 0.08em;
    }

    .pin-input::placeholder {
      color: #b7b8bd;
    }

    .submit {
      width: 100%;
      height: 46px;
      border: 0;
      border-radius: 9px;
      background: var(--primary);
      color: #fff;
      font: inherit;
      font-size: 21px;
      font-weight: 800;
      cursor: pointer;
      box-shadow: 0 3px 7px rgba(52, 96, 190, 0.24);
    }

    .submit:active {
      background: var(--primary-pressed);
      transform: translateY(1px);
    }

    .message {
      min-height: 22px;
      margin-top: 14px;
      text-align: center;
      color: #9a9ca3;
      font-size: 13px;
    }

    .message.error {
      color: #d84646;
    }

    .copyright {
      color: #b9bbc1;
      text-align: center;
      font-size: 13px;
    }

    @media (max-width: 920px) {
      body {
        overflow: auto;
      }

      .login-shell {
        grid-template-columns: 1fr;
        min-height: 100vh;
        padding: 12px;
        gap: 12px;
      }

      .client-stage {
        min-height: 34vh;
      }

      .client-badge {
        width: min(280px, 72vw);
      }

      .client-mark {
        width: 116px;
        height: 70px;
      }

      .client-mark::before,
      .client-mark::after {
        width: 53px;
        height: 70px;
      }

      .client-name-logo {
        font-size: 28px;
      }

      .login-panel {
        min-height: auto;
        grid-template-rows: auto auto auto;
        gap: 36px;
        padding: 36px 22px 28px;
      }

      .login-form {
        transform: none;
      }
    }
  </style>
</head>
<body>
  <main class="login-shell">
    <section class="client-stage" aria-label="Client brand">
      <div class="client-badge">
        <div class="client-badge-content">
          <div class="client-mark" aria-hidden="true"></div>
          <div class="client-name-logo" data-client-name>Molly's Caffe</div>
        </div>
      </div>
    </section>

    <section class="login-panel" aria-label="Login">
      <div class="product-logo" aria-label="bartek">
        <span class="product-symbol" aria-hidden="true"><span class="product-hole"></span></span>
        <span>bartek</span>
      </div>

      <form class="login-form" id="loginForm">
        <h1 class="venue-title" data-client-name>Molly's Caffe</h1>
        <p class="helper-text">Pershendetje, ju lutemi jepni te dhenat</p>

        <div class="mode-tabs" role="tablist" aria-label="Login mode">
          <button class="active" id="posMode" type="button" role="tab" aria-selected="true">POS</button>
          <button id="adminMode" type="button" role="tab" aria-selected="false">Admin Panel</button>
        </div>

        <div class="field">
          <svg class="field-icon" viewBox="0 0 24 24" fill="none" aria-hidden="true">
            <path d="M7 10V8a5 5 0 0 1 10 0v2" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
            <rect x="5.5" y="10" width="13" height="10" rx="2" stroke="currentColor" stroke-width="1.8"/>
            <path d="M12 14v2.5" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
          </svg>
          <input class="pin-input" id="secret" type="password" inputmode="numeric" placeholder="************" autocomplete="current-password" />
        </div>

        <button class="submit" type="submit">Hyrja</button>
        <div class="message" id="message" aria-live="polite"></div>
      </form>

      <p class="copyright">© 2026 InTouch Data sh.p.k. All rights reserved.</p>
    </section>
  </main>

  <script>
    const state = {
      mode: 'pos',
      clientName: "Molly's Caffe"
    };

    const form = document.getElementById('loginForm');
    const secret = document.getElementById('secret');
    const message = document.getElementById('message');
    const posMode = document.getElementById('posMode');
    const adminMode = document.getElementById('adminMode');

    function setMode(mode) {
      state.mode = mode;
      const isPos = mode === 'pos';
      posMode.classList.toggle('active', isPos);
      adminMode.classList.toggle('active', !isPos);
      posMode.setAttribute('aria-selected', String(isPos));
      adminMode.setAttribute('aria-selected', String(!isPos));
      secret.value = '';
      secret.inputMode = isPos ? 'numeric' : 'text';
      message.textContent = '';
      message.classList.remove('error');
      secret.focus();
    }

    function setClientName(name) {
      state.clientName = name;
      document.querySelectorAll('[data-client-name]').forEach(node => {
        node.textContent = name;
      });
      document.title = `bartek POS - ${name}`;
    }

    form.addEventListener('submit', event => {
      event.preventDefault();
      const value = secret.value.trim();
      if (!value) {
        message.textContent = state.mode === 'pos' ? 'Shkruaj PIN-in.' : 'Shkruaj fjalekalimin.';
        message.classList.add('error');
        return;
      }

      message.classList.remove('error');
      message.textContent = state.mode === 'pos'
        ? 'POS login ready for API wiring.'
        : 'Admin login ready for API wiring.';
    });

    posMode.addEventListener('click', () => setMode('pos'));
    adminMode.addEventListener('click', () => setMode('admin'));

    window.bartekLogin = {
      setClientName,
      setMode
    };
  </script>
</body>
</html>
